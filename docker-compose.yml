services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      FRONTEND_URL: http://localhost:5173
      CORS_ORIGINS: http://localhost:5173
    volumes:
      - intellisec-data:/app/.data

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000/api
    volumes:
      - ./frontend:/app
    depends_on:
      - backend

volumes:
  intellisec-data:

